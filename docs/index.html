<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BiVokter — Norsk birøkterapp</title>
  <meta name="description" content="BiVokter er den smarte birøkterappen for norske birøktere. Hold oversikt over kubene dine med inspeksjonsdagbok, kalender og helsepoeng.">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1A1A2E;
      color: #F8F4EF;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }
    svg.logo { width: 100px; height: 100px; margin-bottom: 24px; }
    h1 { font-size: 48px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .tagline { font-size: 20px; color: #F5A623; margin-bottom: 40px; }
    p { max-width: 520px; font-size: 16px; color: #c8c4c0; line-height: 1.7; margin-bottom: 40px; }
    .links { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    a.btn {
      display: inline-block;
      background: #F5A623;
      color: #1A1A2E;
      font-weight: 600;
      font-size: 16px;
      padding: 14px 28px;
      border-radius: 10px;
      text-decoration: none;
    }
    a.btn.ghost {
      background: transparent;
      border: 2px solid #F5A623;
      color: #F5A623;
    }
  </style>
</head>
<body>
  <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#F5A623"/>
        <stop offset="100%" stop-color="#D4890A"/>
      </linearGradient>
    </defs>
    <polygon points="50,5 93,27.5 93,72.5 50,95 7,72.5 7,27.5" fill="url(#g)"/>
    <ellipse cx="50" cy="48" rx="10" ry="14" fill="#FFF3DC"/>
    <rect x="41" y="46" width="18" height="3" fill="#D4890A" rx="1"/>
    <rect x="41" y="51" width="18" height="3" fill="#D4890A" rx="1"/>
    <ellipse cx="36" cy="39" rx="10" ry="5" fill="#FFF3DC" opacity="0.8" transform="rotate(-20 36 39)"/>
    <ellipse cx="64" cy="39" rx="10" ry="5" fill="#FFF3DC" opacity="0.8" transform="rotate(20 64 39)"/>
    <circle cx="50" cy="34" r="6" fill="#FFF3DC"/>
  </svg>

  <h1>BiVokter</h1>
  <p class="tagline">Norsk birøkterapp</p>
  <p>Den smarte birøkterappen for norske birøktere. Hold oversikt over kubene dine med inspeksjonsdagbok, kalender, helsepoeng og varroasporing.</p>

  <div class="links">
    <a href="https://play.google.com/store/apps/details?id=no.biapp.app" class="btn">Last ned på Google Play</a>
    <a href="/biapp/privacy" class="btn ghost">Personvernerklæring</a>
  </div>
</body>
</html>
