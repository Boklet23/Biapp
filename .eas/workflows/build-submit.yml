name: Build and Submit to Google Play

on:
  push:
    branches:
      - master

jobs:
  build_android:
    name: Build Android AAB
    type: build
    params:
      platform: android
      profile: production

  submit_android:
    name: Submit to Play Store (Internal Testing)
    needs:
      - build_android
    type: submit
    params:
      profile: production
      build_id: ${{ needs.build_android.outputs.build_id }}
